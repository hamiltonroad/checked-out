/api/v1/ratings/books/{bookId}:
  get:
    tags: [Ratings]
    summary: Get current patron's rating for a specific book
    operationId: getMyRatingForBook
    security:
      - cookieAuth: []
    parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
        description: Book ID
    responses:
      '200':
        description: The patron's rating for this book
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas.yaml#/ApiSuccessResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas.yaml#/Rating'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
  delete:
    tags: [Ratings]
    summary: Delete current patron's rating for a book
    operationId: deleteRating
    description: Rate-limited (strict).
    security:
      - cookieAuth: []
    parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: integer
        description: Book ID
    responses:
      '200':
        description: Rating deleted
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas.yaml#/ApiSuccessResponse'
                - type: object
                  properties:
                    data:
                      type: object
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'

