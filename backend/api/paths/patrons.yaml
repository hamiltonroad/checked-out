# Patrons — Library patron management
# Base path: /api/v1/patrons

/api/v1/patrons:
  get:
    tags: [Patrons]
    summary: List patrons with optional status filter
    operationId: listPatrons
    security:
      - cookieAuth: []
    parameters:
      - name: status
        in: query
        schema:
          type: string
          enum: [active, inactive, suspended]
        description: Filter by patron status
    responses:
      '200':
        description: List of patrons
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas.yaml#/ApiSuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '../components/schemas.yaml#/Patron'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/patrons/search:
  get:
    tags: [Patrons]
    summary: Search patrons by name or card number
    operationId: searchPatrons
    security:
      - cookieAuth: []
    parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 2
          maxLength: 100
        description: Search term (partial name or card number)
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          minimum: 1
          maximum: 10
        description: Maximum results to return
    responses:
      '200':
        description: Matching patrons
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas.yaml#/ApiSuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '../components/schemas.yaml#/Patron'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/patrons/recent:
  get:
    tags: [Patrons]
    summary: Get recently checked-out-to patrons
    operationId: getRecentPatrons
    security:
      - cookieAuth: []
    parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 5
          minimum: 1
          maximum: 5
        description: Maximum recent patrons to return
    responses:
      '200':
        description: Recent patrons
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas.yaml#/ApiSuccessResponse'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '../components/schemas.yaml#/Patron'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'

/api/v1/patrons/{id}:
  get:
    tags: [Patrons]
    summary: Get a patron by ID
    operationId: getPatronById
    security:
      - cookieAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        description: Patron ID
    responses:
      '200':
        description: Patron details
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas.yaml#/ApiSuccessResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas.yaml#/Patron'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses.yaml#/Forbidden'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
